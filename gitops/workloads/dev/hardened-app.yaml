apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-hardened-workloads
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  project: default
  source:
    repoURL: https://github.com/staocubee/k8s-MSEF.git
    targetRevision: main
    path: k8s/hardened
  destination:
    server: https://kubernetes.default.svc
    namespace: hardened
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true