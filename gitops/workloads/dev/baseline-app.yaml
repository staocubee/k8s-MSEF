apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-baseline-workloads
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/staocubee/k8s-MSEF.git
    targetRevision: main
    path: k8s/baseline
  destination:
    server: https://kubernetes.default.svc
    namespace: baseline
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true