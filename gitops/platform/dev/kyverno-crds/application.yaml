apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-kyverno-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default

  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: 3.8.2
    helm:
      values: |
        installCRDs: true

        admissionController:
          enabled: false

        backgroundController:
          enabled: false

        cleanupController:
          enabled: false

        reportsController:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true