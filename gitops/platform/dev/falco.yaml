apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-falco
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 8.0.5
    helm:
      values: |
        driver:
          enabled: true
          kind: modern_ebpf

        falco:
          jsonOutput: true
          logLevel: info
          priority: debug

        falcosidekick:
          enabled: false

        collectors:
          kubernetes:
            enabled: true

        serviceAccount:
          create: true

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true