apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/staocubee/k8s-MSEF.git
    targetRevision: HEAD
    path: gitops/platform/dev/kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true