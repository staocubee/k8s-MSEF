apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9" # Deployed first so policies can cover subsequent apps
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: 3.3.7
    helm:
      values: |
        installCRDs: true
        admissionController:
          replicas: 2
        backgroundController:
          replicas: 1
        cleanupController:
          replicas: 1
        reportsController:
          replicas: 1
        config:
          resourceFiltersExcludeNamespaces:
            - kube-system
            - kyverno
            - argocd
            - cert-manager
            - falco
            - gatekeeper-system
        features:
          admissionReports:
            enabled: true
          policyReports:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true