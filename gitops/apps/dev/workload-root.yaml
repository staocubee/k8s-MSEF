apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-workloads-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/staocubee/k8s-MSEF.git
    targetRevision: main
    path: gitops/workloads/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true