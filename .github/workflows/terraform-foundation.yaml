name: Terraform Foundation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, stg, prod]
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options: [fmt, init, validate, plan, apply, destroy-plan, destroy]

permissions:
  contents: read
  id-token: write
  actions: write

concurrency:
  group: foundation-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"

jobs:

  ##########################################################
  # Everything except apply — runs immediately, ungated
  ##########################################################

  foundation:
    if: github.event.inputs.action != 'apply'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: terraform/foundation/envs/${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform fmt -recursive
        if: github.event.inputs.action == 'fmt'
      - run: terraform init
        if: contains('init validate plan destroy-plan destroy', github.event.inputs.action)
      - run: terraform validate
        if: github.event.inputs.action == 'validate'
      - run: terraform plan
        if: github.event.inputs.action == 'plan'
      - run: terraform plan -destroy
        if: github.event.inputs.action == 'destroy-plan'
      - run: terraform destroy -auto-approve
        if: github.event.inputs.action == 'destroy'

  ##########################################################
  # Apply — plan first for visibility, then gated apply
  ##########################################################

  plan-before-apply:
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: terraform/foundation/envs/${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform plan

  apply:
    needs: plan-before-apply
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}-apply
    defaults:
      run:
        shell: bash
        working-directory: terraform/foundation/envs/${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform apply -auto-approve

  ##########################################################
  # Chain — dev only, fires infra after dev apply
  ##########################################################

  trigger-infra:
    needs: apply
    if: github.event.inputs.environment == 'dev' && success()
    runs-on: ubuntu-latest
    steps:
      - run: gh workflow run terraform-infra.yaml --ref main -f environment=dev -f action=apply
        env:
          GH_TOKEN: ${{ github.token }}