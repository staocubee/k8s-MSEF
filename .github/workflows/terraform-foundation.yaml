name: Terraform Foundation

on:

  workflow_dispatch:

    inputs:

      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stg
          - prod

      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options:
          - fmt
          - init
          - validate
          - plan
          - apply
          - destroy-plan
          - destroy

permissions:
  contents: read
  id-token: write

concurrency:
  group: foundation-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"

jobs:

  foundation:

    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: terraform/foundation/envs/${{ github.event.inputs.environment }}

    steps:

      - uses: actions/checkout@v4

      ##########################################################
      # Workload Identity Authentication
      ##########################################################

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        if: github.event.inputs.action == 'fmt'
        run: terraform fmt -recursive

      - name: Terraform init
        if: contains('init validate plan apply destroy-plan destroy', github.event.inputs.action)
        run: terraform init

      - name: Terraform validate
        if: github.event.inputs.action == 'validate'
        run: terraform validate

      - name: Terraform plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve

      - name: Terraform destroy plan
        if: github.event.inputs.action == 'destroy-plan'
        run: terraform plan -destroy

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve