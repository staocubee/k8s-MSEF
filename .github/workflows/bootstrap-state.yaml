name: Bootstrap State

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stg
          - prod

      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options:
          - fmt
          - init
          - validate
          - plan
          - apply
          - destroy-plan
          - destroy

permissions:
  contents: read

concurrency:
  group: bootstrap-state-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"

jobs:

  bootstrap-state:

    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: terraform/bootstrap-state/envs/${{ github.event.inputs.environment }}

    steps:

      - uses: actions/checkout@v4

      ######################################################
      # Bootstrap authentication using SA Key
      ######################################################

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_BOOTSTRAP_KEY }}'

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform fmt -recursive
        if: github.event.inputs.action == 'fmt'

      - run: terraform init
        if: contains('init validate plan apply destroy-plan destroy', github.event.inputs.action)

      - run: terraform validate
        if: github.event.inputs.action == 'validate'

      - run: terraform plan
        if: github.event.inputs.action == 'plan'

      - run: terraform apply -auto-approve
        if: github.event.inputs.action == 'apply'

      - run: terraform plan -destroy
        if: github.event.inputs.action == 'destroy-plan'

      - run: terraform destroy -auto-approve
        if: github.event.inputs.action == 'destroy'