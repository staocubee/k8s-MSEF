name: Build Sign Deploy Report

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, stg, prod]
      source_run_id:
        description: "Run ID of the security-orchestrator run to pull results/index.html from"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write
  actions: read   # required to download artifacts from another run

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  REPORT_IMAGE_NAME: ${{ vars.REPORT_IMAGE_NAME }}

jobs:
  build-sign-deploy:
    name: Build, Sign, Deploy Report
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}-apply

    steps:
      - uses: actions/checkout@v4

      - name: Download orchestrator results
        if: github.event.inputs.source_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: security-orchestrator-${{ github.event.inputs.environment }}
          run-id: ${{ github.event.inputs.source_run_id }}
          github-token: ${{ github.token }}
          path: results/

      - name: Verify results present
        run: |
          if [ ! -f results/index.html ]; then
            echo "::warning::results/index.html not found — was source_run_id provided? Continuing with a manual/standalone run."
          fi

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet || true
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> "$GITHUB_ENV"

      - name: Reset kubeconfig
        run: rm -rf "$HOME/.kube" && mkdir -p "$HOME/.kube"

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials "${{ github.event.inputs.environment }}-msef-gke" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID"

      - name: Verify cluster access
        run: |
          kubectl config current-context
          kubectl get nodes
          kubectl get ns

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE=${DOCKERHUB_USERNAME}/${REPORT_IMAGE_NAME}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Build report image
        run: docker build -f Dockerfile.report -t "$IMAGE" .

      - run: docker push "$IMAGE"

      - uses: sigstore/cosign-installer@v3

      - name: Write Cosign key
        run: |
          printf "%s" "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          chmod 600 cosign.key

      - name: Sign image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: cosign sign --yes --key cosign.key "$IMAGE"

      - name: Update report deployment image
        run: |
          sed -i "s|image: .*k8s-security-report.*|image: ${IMAGE}|g" k8s/report-server/report-deployment.yaml

      - name: Deploy report server
        run: |
          kubectl apply -k k8s/report-server
          kubectl rollout status deployment/security-report-server -n hardened --timeout=180s
          kubectl get svc security-report-service -n hardened

      - uses: actions/upload-artifact@v4
        with:
          name: report-html-${{ github.event.inputs.environment }}
          path: results/index.html