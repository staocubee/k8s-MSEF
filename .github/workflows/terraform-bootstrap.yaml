name: Terraform Bootstrap

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod

      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - fmt
          - validate
          - plan
          - apply
          - destroy-plan
          - destroy

permissions:
  contents: read
  id-token: write
  actions: write

concurrency:
  group: terraform-bootstrap-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}

jobs:
  terraform-bootstrap:
    name: Bootstrap - ${{ github.event.inputs.environment }} - ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: terraform/bootstrap/envs/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install GKE auth plugin
        if: github.event.inputs.action != 'fmt'
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet || true
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> "$GITHUB_ENV"

      - name: Reset kubeconfig
        if: github.event.inputs.action != 'fmt'
        run: |
          rm -rf "$HOME/.kube"
          mkdir -p "$HOME/.kube"

      - name: Get GKE credentials
        if: github.event.inputs.action != 'fmt'
        continue-on-error: ${{ github.event.inputs.action == 'destroy' || github.event.inputs.action == 'destroy-plan' }}
        run: |
          gcloud container clusters get-credentials "${{ github.event.inputs.environment }}-msef-gke" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID"

      - name: Verify cluster access
        if: github.event.inputs.action != 'fmt' && github.event.inputs.action != 'destroy' && github.event.inputs.action != 'destroy-plan'
        run: |
          kubectl config current-context
          kubectl get nodes
          kubectl get ns
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        if: github.event.inputs.action == 'fmt'
        run: terraform fmt -recursive -check

      - name: Terraform init
        if: github.event.inputs.action != 'fmt'
        run: terraform init

      - name: Terraform validate
        if: github.event.inputs.action == 'validate'
        run: terraform validate

      - name: Terraform plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -input=false

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false

      - name: Terraform destroy plan
        if: github.event.inputs.action == 'destroy-plan'
        run: terraform plan -destroy -input=false

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false
    
  trigger-security-evaluation:
    needs: apply
    if: github.event.inputs.environment == 'dev' && success()
    runs-on: ubuntu-latest
    steps:
      - run: gh workflow run security-evaluation.yaml --ref main -f environment=dev
        env:
          GH_TOKEN: ${{ github.token }}