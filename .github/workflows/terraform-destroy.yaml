name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod

      destroy_foundation:
        description: "Also destroy foundation? Dangerous."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-destroy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}

jobs:
  destroy-bootstrap:
    name: Destroy Bootstrap
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: terraform/bootstrap/envs/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Configure GKE auth plugin
        run: |
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> "$GITHUB_ENV"
          gke-gcloud-auth-plugin --version

      - name: Reset kubeconfig
        run: |
          rm -rf "$HOME/.kube"
          mkdir -p "$HOME/.kube"

      - name: Get GKE credentials
        continue-on-error: true
        run: |
          gcloud container clusters get-credentials "${{ github.event.inputs.environment }}-msef-gke" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID"

      - name: Verify cluster access
        continue-on-error: true
        run: |
          kubectl config current-context || true
          kubectl get nodes || true
          kubectl get ns || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Pre-clean ArgoCD applications
        run: |
          kubectl delete applications --all -n argocd --timeout=120s || true
          kubectl get applications -n argocd || true

      - name: Pre-clean stuck ArgoCD namespace finalizers
        continue-on-error: true
        run: |
          if kubectl get ns argocd >/dev/null 2>&1; then
            echo "Checking argocd namespace status..."
            kubectl get ns argocd -o jsonpath='{.status.phase}' || true
            echo ""

            kubectl delete applications --all -n argocd --timeout=120s || true
            kubectl delete all --all -n argocd --timeout=120s || true

            PHASE=$(kubectl get ns argocd -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")

            if [ "$PHASE" = "Terminating" ]; then
              echo "argocd namespace is stuck terminating. Removing finalizers..."
              kubectl get namespace argocd -o json > /tmp/argocd-ns.json
              jq '.spec.finalizers=[]' /tmp/argocd-ns.json > /tmp/argocd-ns-finalize.json
              kubectl replace --raw "/api/v1/namespaces/argocd/finalize" -f /tmp/argocd-ns-finalize.json || true
            fi
          else
            echo "argocd namespace not found. Skipping pre-clean."
          fi

      - name: Terraform destroy bootstrap
        run: terraform destroy -auto-approve -input=false

  destroy-infra:
    name: Destroy Infra
    runs-on: ubuntu-latest
    needs: destroy-bootstrap

    defaults:
      run:
        shell: bash
        working-directory: terraform/infra/envs/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform destroy infra
        run: terraform destroy -auto-approve -input=false

  destroy-foundation:
    name: Destroy Foundation
    runs-on: ubuntu-latest
    needs: destroy-infra
    if: github.event.inputs.destroy_foundation == 'true'

    defaults:
      run:
        shell: bash
        working-directory: terraform/foundation/envs/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform destroy foundation
        run: terraform destroy -auto-approve -input=false