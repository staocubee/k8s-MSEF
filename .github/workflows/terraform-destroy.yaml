name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod

      destroy_foundation:
        description: "Also destroy foundation? Dangerous."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-destroy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}

jobs:
  destroy-bootstrap:
    name: Destroy Bootstrap
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: terraform/bootstrap/envs/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        continue-on-error: true
        run: |
          gcloud container clusters get-credentials "${{ github.event.inputs.environment }}-msef-gke" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Pre-clean ArgoCD applications
        if: github.event.inputs.action == 'destroy'
        run: |
          kubectl delete applications --all -n argocd --timeout=120s || true
          kubectl get applications -n argocd || true

      - name: Terraform destroy bootstrap
        run: terraform destroy -auto-approve -input=false

  destroy-infra:
    name: Destroy Infra
    runs-on: ubuntu-latest
    needs: destroy-bootstrap

    defaults:
      run:
        shell: bash
        working-directory: terraform/infra/envs/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform destroy infra
        run: terraform destroy -auto-approve -input=false

  destroy-foundation:
    name: Destroy Foundation
    runs-on: ubuntu-latest
    needs: destroy-infra
    if: github.event.inputs.destroy_foundation == 'true'

    defaults:
      run:
        shell: bash
        working-directory: terraform/foundation/envs/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform destroy foundation
        run: terraform destroy -auto-approve -input=false