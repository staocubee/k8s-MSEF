name: Terraform Infra

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, stg, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [fmt, validate, plan, apply, destroy-plan, destroy]

permissions:
  contents: read
  id-token: write
  actions: write

concurrency:
  group: terraform-infra-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  TF_IN_AUTOMATION: "true"

jobs:

  ##########################################################
  # Everything except apply
  ##########################################################

  infra:
    if: github.event.inputs.action != 'apply'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: terraform/infra/envs/${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          export_environment_variables: true
      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform fmt -recursive -check
        if: github.event.inputs.action == 'fmt'
      - run: terraform init
        if: contains('validate plan destroy-plan destroy', github.event.inputs.action)
      - run: terraform validate
        if: github.event.inputs.action == 'validate'
      - run: terraform plan -input=false
        if: github.event.inputs.action == 'plan'
      - run: terraform plan -destroy -input=false
        if: github.event.inputs.action == 'destroy-plan'
      - run: terraform destroy -auto-approve -input=false
        if: github.event.inputs.action == 'destroy'

  ##########################################################
  # Apply — plan first, then gated apply
  ##########################################################

  plan-before-apply:
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: terraform/infra/envs/${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          export_environment_variables: true
      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform plan -input=false

  apply:
    needs: plan-before-apply
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}-apply
    defaults:
      run:
        shell: bash
        working-directory: terraform/infra/envs/${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          export_environment_variables: true
      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform apply -auto-approve -input=false

  ##########################################################
  # Chain — dev only, fires build-sign-deploy after dev apply
  ##########################################################

  trigger-build-sign-deploy:
    needs: apply
    if: github.event.inputs.environment == 'dev' && success()
    runs-on: ubuntu-latest
    steps:
      - run: gh workflow run terraform-bootstrap.yaml --ref main -f environment=dev
        env:
          GH_TOKEN: ${{ github.token }}