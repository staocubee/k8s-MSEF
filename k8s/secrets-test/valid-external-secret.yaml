apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secret
  namespace: hardened
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore

  target:
    name: app-secret

  data:
    - secretKey: password
      remoteRef:
        key: app-password