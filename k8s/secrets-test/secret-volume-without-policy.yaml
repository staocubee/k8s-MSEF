apiVersion: v1
kind: Secret
metadata:
  name: app-certs
  namespace: hardened
type: Opaque
stringData:
  tls.key: "---BEGIN PRIVATE KEY---\nMIIEvgIBADANBgkqhkiG9w0BAQEFAAS..."
---
apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-without-policy
  namespace: hardened
spec:
  containers:
    - name: nginx
      image: nginx:1.27
      volumeMounts:
        - name: secret-volume
          mountPath: "/etc/secrets"
          readOnly: true
  volumes:
    - name: secret-volume
      secret:
        secretName: app-certs
        # Note: defaultMode is left default (0644) without restrictive fsGroup/securityContext