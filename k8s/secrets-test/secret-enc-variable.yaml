apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: hardened
type: Opaque
stringData:
  password: "SuperSecretPassword123!"
---
apiVersion: v1
kind: Pod
metadata:
  name: secret-env-variable
  namespace: hardened
spec:
  containers:
    - name: nginx
      image: nginx:1.27
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password