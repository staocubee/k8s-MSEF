apiVersion: v1
kind: Pod
metadata:
  name: trigger-sensitive-file
  namespace: hardened
  labels:
    app: trigger-sensitive-file
spec:
  restartPolicy: Never
  containers:
    - name: attacker
      image: alpine:3.20
      command:
        - sh
        - -c
        - |
          sleep 5
          # Triggers Falco rule: "Read sensitive file untrusted" / "Sensitive File Access"
          cat /etc/shadow
          sleep 300