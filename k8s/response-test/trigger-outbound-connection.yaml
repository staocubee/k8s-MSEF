apiVersion: v1
kind: Pod
metadata:
  name: trigger-outbound-connection
  namespace: hardened
  labels:
    app: trigger-outbound-connection
spec:
  restartPolicy: Never
  containers:
    - name: attacker
      image: alpine:3.20
      command:
        - sh
        - -c
        - |
          sleep 5
          # Triggers Falco rule: "Outbound Connection" via raw socket/nc
          nc -zv -w 2 1.1.1.1 53 || true
          sleep 300