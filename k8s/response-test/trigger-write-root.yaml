apiVersion: v1
kind: Pod
metadata:
  name: trigger-write-root
  namespace: hardened
  labels:
    app: trigger-write-root
spec:
  restartPolicy: Never
  containers:
    - name: attacker
      image: alpine:3.20
      command:
        - sh
        - -c
        - |
          sleep 5
          # Triggers Falco rule: "Write below root"
          touch /root/hacked.txt
          echo "tampered" > /test.tmp
          sleep 300