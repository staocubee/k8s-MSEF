apiVersion: v1
kind: Pod
metadata:
  name: trigger-outbound-curl
  namespace: hardened
  labels:
    app: trigger-outbound-curl
spec:
  restartPolicy: Never
  containers:
    - name: attacker
      image: alpine:3.20
      command:
        - sh
        - -c
        - |
          apk add --no-cache curl
          sleep 5
          # Triggers Falco rule: "Outbound Curl"
          curl -s http://example.com
          sleep 300