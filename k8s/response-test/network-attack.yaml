apiVersion: v1
kind: Pod
metadata:
  name: network-attacker
  namespace: hardened
spec:
  restartPolicy: Never
  containers:
    - name: attacker
      image: alpine:3.20
      command:
        - sh
        - -c
        - |
          apk add --no-cache curl
          sleep 10
          curl http://example.com
          sleep 300