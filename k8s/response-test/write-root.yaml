apiVersion: v1
kind: Pod
metadata:
  name: write-root
  namespace: hardened
spec:
  restartPolicy: Never
  containers:
    - name: attacker
      image: alpine:3.20
      command:
        - sh
        - -c
        - |
          sleep 10
          touch /root/hacked
          echo hacked >/root/test.txt
          sleep 300