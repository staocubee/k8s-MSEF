apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: baseline
data:
  app.conf: |
    LOG_LEVEL=info
    ENABLE_METRICS=true
---
apiVersion: v1
kind: Pod
metadata:
  name: benign-configmap-reader
  namespace: baseline
  labels:
    app: benign-configmap-reader
spec:
  restartPolicy: Never
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: config-reader
    image: busybox:1.36
    command: ["sh", "-c", "cat /etc/config/app.conf && sleep 5"]
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    volumeMounts:
    - name: config-volume
      mountPath: /etc/config
      readOnly: true
  volumes:
  - name: config-volume
    configMap:
      name: app-config