# Evaluation Focus: Detects unauthorized reads or modifications to sensitive host/system paths (e.g., /etc/shadow, /etc/passwd, /etc/kubernetes/, or cloud service account tokens).
apiVersion: v1
kind: Pod
metadata:
  name: sensitive-file-test
  namespace: hardened
  annotations:
    msef.io/falco-rule: Detects sensitive file access
  labels:
    app: sensitive-file-test
    environment: hardened
spec:
  serviceAccountName: hardened-app-sa
  automountServiceAccountToken: true
  containers:
  - name: sensitive-file-trigger
    image: busybox:1.36
    # Triggers a read attempt on system shadow/passwd files and mounted tokens
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "[+] Attempting sensitive file access..."
        cat /etc/shadow 2>/dev/null || true
        cat /etc/passwd
        cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || true
        sleep 3600
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: false
      capabilities:
        drop:
        - ALL
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"