#Evaluation Focus: Detects raw socket connections or shell-level network socket creation (e.g., /dev/tcp, nc, or raw socket syscalls) attempting to connect to external IPs or internal metadata services
apiVersion: v1
kind: Pod
metadata:
  name: network-connect-test
  namespace: hardened
  annotations:
    msef.io/falco-rule: Detects raw socket connections
  labels:
    app: network-connect-test
    environment: hardened
spec:
  serviceAccountName: hardened-app-sa
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: network-connect-trigger
    image: busybox:1.36
    # Initiates raw socket connections to external public DNS and Cloud Metadata endpoints
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "[+] Executing raw network connections..."
        nc -zv -w 2 1.1.1.1 53 2>/dev/null || true
        nc -zv -w 2 169.254.169.254 80 2>/dev/null || true
        sleep 3600
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 101
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
        - ALL
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"