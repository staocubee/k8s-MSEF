apiVersion: apps/v1
kind: Deployment
metadata:
  name: hardened-nginx
  namespace: hardened
  labels:
    app: hardened-nginx
    environment: hardened
    security-profile: restricted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hardened-nginx
  template:
    metadata:
      labels:
        app: hardened-nginx
        environment: hardened
        security-profile: restricted
    spec:
      serviceAccountName: hardened-app-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nginx
        image: nginx:1.27.4
        ports:
        - containerPort: 80
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 101
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      - name: tmp
        emptyDir: {}