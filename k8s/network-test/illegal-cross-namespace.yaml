apiVersion: v1
kind: Pod
metadata:
  name: illegal-cross-namespace
  namespace: baseline
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.8.0
      command:
        - sh
        - -c
        - |
          curl --connect-timeout 5 http://hardened-nginx.hardened.svc.cluster.local